name: Release

# Builds native installers for Windows, macOS, and Linux and publishes them to a
# public GitHub Release. Runs only on a version tag (e.g. v0.1.1) or manual
# dispatch — not on every push.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write # required to create the GitHub Release

jobs:
  build:
    name: Build ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf \
            build-essential curl wget file libxdo-dev libssl-dev

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test

      - name: Build & publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # For signed silent auto-updates, add these repo secrets and they will
          # be picked up automatically (also add the pubkey to tauri.conf.json):
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "VynMindMap ${{ github.ref_name }}"
          releaseBody: "Download the installer for your operating system below."
          releaseDraft: false
          prerelease: false
