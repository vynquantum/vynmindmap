name: CI

# Lightweight per-push checks (Ubuntu only, ~2 min). Free & unlimited on public
# repos. The heavy cross-OS installer build lives in release.yml and runs only
# on version tags / manual dispatch.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint & test (Node core + frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check core
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Type-check Svelte app
        run: npm run check

      - name: Build frontend
        run: npm run build:app
